name: notification-cron

# Vercel Hobby プランは cron jobs を 1 日 1 回しか実行できないため、
# 30 分毎の通知配信は GitHub Actions の schedule で代用する。
#
# 必要な GitHub Secrets:
#   - CRON_TARGET_URL : 例 https://www.deaf-ic-nagoya.org (末尾スラッシュ無し)
#   - CRON_SECRET     : Vercel env と同じ値。Authorization: Bearer ${CRON_SECRET} で検証される
#
# 動作: 30 分毎に POST /api/cron/send-notifications を叩き、
# notification_queue から scheduled_at <= now() の行を Resend で送信する。
#
# 履歴: 当初 */10 (10 分) だったが、GitHub Actions schedule は公式「best-effort」
# 仕様で高頻度ほど高負荷時に discard されやすく、実際 12 時間以上 1 度も
# 走らないケースがあった (2026-05-17→18)。30 分間隔に下げて discard 確率を
# 抑える方針に変更。digest メールは「2 時間ウィンドウ」設計なので、
# cron 30 分間隔でも最大 2.5 時間以内に発火する想定。

on:
  schedule:
    # GitHub Actions cron は UTC で評価される。
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 手動トリガーも可能 (デバッグ用)

# 重複実行を抑止 (前のジョブが長引いていても次の cron を待たせる)
concurrency:
  group: notification-cron
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke send-notifications endpoint
        env:
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          if [ -z "$CRON_TARGET_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_TARGET_URL or CRON_SECRET secret is not set"
            exit 1
          fi
          # -f は付けない: 4xx/5xx でも body を表示してから判定する (デバッグ性優先)
          # --max-time 240: route handler のタイムアウト目安
          # status と body を別キャプチャ
          http_code=$(curl -sS --max-time 240 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -o /tmp/cron-response.json \
            -w "%{http_code}" \
            "$CRON_TARGET_URL/api/cron/send-notifications")
          echo "HTTP $http_code"
          echo "Body:"
          cat /tmp/cron-response.json || true
          echo ""
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::send-notifications returned HTTP $http_code"
            exit 1
          fi
